name: Multi-repo CLOC
description: Run cloc across multiple GitHub repos, aggregate JSON output, and generate summary outputs.
branding:
  icon: bar-chart-2
  color: blue
inputs:
  repos-json:
    description: >
      JSON array of repo specs.
      Each item may be:
      - "self"
      - "owner/repo"
      - "github.com/owner/repo"
      - "https://github.com/owner/repo"
      Or an object like:
      {
        "repo": "self",
        "useWorkspace": true,
        "ignoredFile": "ignored.txt"
      }
    required: true

  token:
    description: Default token for cloning other private repos.
    required: false
    default: ""

  default-ref:
    description: Default ref for repos that do not specify one.
    required: false
    default: ""

  default-exclude-dir-json:
    description: >
      JSON array of directory names to exclude by default.
      Keep [] if you want behavior close to your current cloc usage.
    required: false
    default: "[]"

  default-cloc-args-json:
    description: >
      JSON array of default cloc args.
      These are applied to each repo unless a repo spec sets inheritDefaultClocArgs=false.
      Do not include --json or --out.
    required: false
    default: "[]"

  github-server-url:
    description: Optional GitHub server URL. Blank uses GITHUB_SERVER_URL.
    required: false
    default: ""

  output-dir:
    description: >
      Directory for generated output. Relative paths are resolved from GITHUB_WORKSPACE.
      Default is .cloc-report so you can inspect it locally in the workspace during the run.
    required: false
    default: ".cloc-report"

  use-current-workspace:
    description: >
      If true, repo spec "self" or current github.repository without explicit ref
      can use the already checked-out workspace instead of cloning again.
    required: false
    default: "true"

  install-cloc:
    description: If true and cloc is missing, install it on Linux via apt-get.
    required: false
    default: "true"

  write-job-summary:
    description: Append generated summary.md to GITHUB_STEP_SUMMARY.
    required: false
    default: "true"

  print-summary:
    description: Print generated summary.md to the log.
    required: false
    default: "true"

  fail-on-repo-error:
    description: Fail the action if one or more repos fail to clone or scan.
    required: false
    default: "true"

outputs:
  output_dir:
    description: Output directory containing raw JSON, aggregate JSON, logs, and markdown summary.

  aggregate_json:
    description: Path to aggregate-cloc.json.

  summary_markdown:
    description: Path to summary.md.

  manifest_json:
    description: Path to manifest.json.

  repo_count:
    description: Number of repos requested.

  scanned_repo_count:
    description: Number of repos successfully scanned.

  failed_repo_count:
    description: Number of repos that failed.

  total_files:
    description: Aggregate nFiles total.

  total_blank:
    description: Aggregate blank total.

  total_comment:
    description: Aggregate comment total.

  total_code:
    description: Aggregate code total.

  has_errors:
    description: true if one or more repos failed.

runs:
  using: node24
  main: main.mjs
